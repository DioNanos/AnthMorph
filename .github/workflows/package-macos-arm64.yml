name: macos-local-build-smoke

on:
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary locally
        run: cargo build --release
      - name: Verify local binary
        run: |
          set -euo pipefail
          file target/release/anthmorph
          target/release/anthmorph --version
